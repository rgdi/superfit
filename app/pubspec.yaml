name: superfit
description: "App de gimnasio auto-hospedada con adaptación inteligente. 100% offline."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Local DB
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0

  # Storage
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.68.0

  # Media
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UX
  wakelock_plus: ^1.2.5
  flutter_local_notifications: ^16.3.3
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # i18n
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/routines/
    - assets/images/exercises/
    - assets/images/machines/
    - assets/images/muscles/
    - assets/svg/
