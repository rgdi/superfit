name: Build SuperFit APK

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: app
        run: flutter pub get

      - name: 🔍 Analyze
        working-directory: app
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: 🧪 Test
        working-directory: app
        run: flutter test

      - name: 🖼️ Generate images
        run: |
          mkdir -p app/assets/svg
          pip install --quiet pillow
          python3 scripts/gen_muscle_maps.py
          python3 scripts/gen_exercise_diagrams.py
          python3 scripts/gen_machines.py
          python3 scripts/gen_app_icon.py

      - name: 🏗️ Build APK
        working-directory: app
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            flutter build apk --debug --split-per-abi
          else
            flutter build apk --release --split-per-abi
          fi

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: superfit-apk-${{ github.event.inputs.build_type || 'release' }}
          path: |
            app/build/app/outputs/flutter-apk/*.apk
            app/build/app/outputs/mapping/release/mapping.txt
          if-no-files-found: error
          retention-days: 30

      - name: 🎉 Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          draft: false
          prerelease: false
          generate_release_notes: true

  verify:
    name: Verify build
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: superfit-apk-${{ github.event.inputs.build_type || 'release' }}
          path: dist

      - name: 📊 Report sizes
        run: |
          echo "## APK Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/*.apk | awk '{print $9, $5}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Total: $(du -sh dist | cut -f1)" >> $GITHUB_STEP_SUMMARY
